plugins {
    id 'java-library'
    id 'kotlin'
    id 'maven-publish'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
//    api project(':ServiceAssistantAnnotation')
    api 'cn.xiaoxige.serviceassistant:annotation:3.1.0'
}

group = 'cn.xiaoxige.serviceassistant'
version = '3.1.0'

base {
    archivesName = 'core'
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = group
            artifactId = 'core'
            from components.java
        }
    }
    repositories {
        maven {
            url = uri('../plugin')
        }
    }
}