def loginComponentIsApplication = !loginComponentIsLibrary.toBoolean()

if (loginComponentIsApplication) {
    apply plugin: 'com.android.application'
    apply plugin: 'service-assistant'
} else {
    apply plugin: 'com.android.library'
}
apply plugin: 'kotlin-android'

android {
    namespace 'cn.xiaoxige.logincomponent'
    compileSdk 34

    // 设置资源前缀
    resourcePrefix "login_"

    defaultConfig {
        if (loginComponentIsApplication) {
            applicationId "cn.xiaoxige.logincomponent"
        }
        minSdk 16
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main {
            if (loginComponentIsApplication) {
                manifest.srcFile 'src/main/AsApplicationAndroidManifest.xml'
            } else {
                manifest.srcFile 'src/main/AndroidManifest.xml'
            }
        }
    }
}

dependencies {

    implementation 'cn.xiaoxige.serviceassistant:core:3.0.0'
//    implementation project(':ServiceAssistantCore')
    implementation project(':LoginApi')

    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation 'androidx.core:core-ktx:1.2.0'
    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'com.google.android.material:material:1.1.0'
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
    testImplementation 'junit:junit:4.+'
    androidTestImplementation 'androidx.test.ext:junit:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'
}